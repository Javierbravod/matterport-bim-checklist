<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0, shrink-to-fit=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>BIM+NP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        /* ── SIDEBAR PANEL ── */
        #checklist-panel {
            display: none;
            position: fixed;
            top: 0;
            right: 0;
            width: 300px;
            height: 100vh;
            background: #1c1c1e;
            z-index: 9999;
            flex-direction: column;
            overflow: hidden;
        }

        #checklist-panel.visible {
            display: flex;
        }

        /* Header */
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px 14px 20px;
            border-bottom: 1px solid #2c2c2e;
            flex-shrink: 0;
        }

        .panel-header-label {
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 0.2px;
        }

        .close-btn {
            background: none;
            border: none;
            color: #8e8e93;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s, background 0.2s;
        }

        .close-btn:hover {
            background: #2c2c2e;
            color: #ffffff;
        }

        /* Step title */
        .panel-step-block {
            padding: 16px 20px 12px 20px;
            border-bottom: 1px solid #2c2c2e;
            flex-shrink: 0;
        }

        .panel-step-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .step-emoji {
            font-size: 18px;
            line-height: 1;
        }

        .step-title-text {
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.3;
        }

        .step-objective {
            font-size: 12px;
            color: #8e8e93;
            line-height: 1.5;
            padding-left: 2px;
        }

        /* Items container */
        .checklist-items-wrap {
            flex: 1;
            overflow-y: auto;
            padding: 12px 20px 20px;
            scrollbar-width: thin;
            scrollbar-color: #3a3a3c #1c1c1e;
        }

        .checklist-items-wrap::-webkit-scrollbar {
            width: 4px;
        }

        .checklist-items-wrap::-webkit-scrollbar-track {
            background: #1c1c1e;
        }

        .checklist-items-wrap::-webkit-scrollbar-thumb {
            background: #3a3a3c;
            border-radius: 2px;
        }

        /* Individual item */
        .checklist-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 0;
            cursor: pointer;
            border-bottom: 1px solid #2c2c2e;
            transition: opacity 0.2s;
        }

        .checklist-item:last-child {
            border-bottom: none;
        }

        .checklist-item:hover {
            opacity: 0.85;
        }

        .check-box {
            width: 16px;
            height: 16px;
            min-width: 16px;
            border: 1.5px solid #636366;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 2px;
            transition: all 0.2s;
            background: transparent;
        }

        .checklist-item.checked .check-box {
            background: #22c55e;
            border-color: #22c55e;
        }

        .check-icon {
            display: none;
            color: white;
            font-size: 10px;
            font-weight: 800;
        }

        .checklist-item.checked .check-icon {
            display: block;
        }

        .item-text {
            font-size: 13px;
            line-height: 1.5;
            color: #d1d1d6;
        }

        .checklist-item.checked .item-text {
            color: #636366;
            text-decoration: line-through;
        }

        .item-text strong {
            color: #ffffff;
            font-weight: 600;
        }

        .checklist-item.checked .item-text strong {
            color: #636366;
        }

        /* Progress footer */
        .panel-footer {
            padding: 14px 20px;
            border-top: 1px solid #2c2c2e;
            flex-shrink: 0;
        }

        .progress-label {
            font-size: 11px;
            color: #8e8e93;
            margin-bottom: 6px;
        }

        .progress-bar-wrap {
            height: 4px;
            background: #3a3a3c;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: #22c55e;
            border-radius: 2px;
            transition: width 0.4s ease;
        }

        /* ── NUMBERED ICONS on the map ── */
        .mp-tag-number {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        /* ── TOGGLE FBX BUTTON ── */
        #toggle-fbx-btn {
            position: fixed;
            top: 56px;
            left: 24px;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: rgba(28, 28, 30, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.25s ease;
            user-select: none;
        }

        #toggle-fbx-btn:hover {
            background: rgba(44, 44, 46, 0.95);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.5);
        }

        #toggle-fbx-btn:active {
            transform: translateY(0);
        }

        .fbx-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 6px #22c55e;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        #toggle-fbx-btn.off .fbx-dot {
            background: #636366;
            box-shadow: none;
        }

        #toggle-fbx-btn.off {
            opacity: 0.7;
        }

        /* ── NEXT STEP BUTTON ── */
        .next-step-btn {
            background-color: #22c55e;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
            margin-top: 16px;
        }

        .next-step-btn:hover {
            background-color: #16a34a;
        }

        /* ── ADVANCE TRAINING BUTTON ── */
        #advance-training-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            margin-top: 16px;
            padding: 12px 16px;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.2px;
            box-shadow: 0 4px 16px rgba(34, 197, 94, 0.35);
            transition: all 0.25s ease;
            user-select: none;
        }

        #advance-training-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.5);
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
        }

        #advance-training-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(34, 197, 94, 0.3);
        }

        #advance-training-btn.finalizar {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            box-shadow: 0 4px 16px rgba(245, 158, 11, 0.35);
        }

        #advance-training-btn.finalizar:hover {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.5);
        }

        #advance-training-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>

<body>
    <!-- SIDEBAR PANEL -->
    <div id="checklist-panel">
        <div class="panel-header">
            <span class="panel-header-label" id="panel-header-label">Paso 1</span>
            <button class="close-btn" onclick="closeChecklist()">✕</button>
        </div>
        <div class="panel-step-block">
            <div class="panel-step-title">
                <span class="step-emoji" id="panel-step-emoji">📋</span>
                <span class="step-title-text" id="panel-title-text">Paso 1</span>
            </div>
            <div class="step-objective" id="panel-objective"></div>
        </div>
        <div class="checklist-items-wrap" id="checklist-items-container"></div>
        <div class="panel-footer">
            <div class="progress-label" id="progress-label">0 / 0 completados</div>
            <div class="progress-bar-wrap">
                <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
            </div>
        </div>
    </div>

    <!-- TOGGLE FBX BUTTON -->
    <button id="toggle-fbx-btn" onclick="toggleFbxModel()" style="display:none">
        <span class="fbx-dot"></span>
        <span>🏗️</span>
        <span id="toggle-fbx-label">Modelo BIM</span>
    </button>



    <iframe id="showcase" width="100%" height="100%"
        src="./bundle/showcase.html?m=hXEV8zd9GFy&play=1&qs=1&log=0&applicationKey=myhcpcdgdh7907ggei7s5f4md"
        frameborder="0" allowfullscreen allow="vr; xr-spatial-tracking"></iframe>

    <script>
        const showcase = document.getElementById('showcase');
        let sdk;
        let mpSdk = null;         // alias semántico expuesto tras connect()
        let fbxNode = null;      // referencia al nodo FBX
        let fbxVisible = true;   // estado actual de visibilidad

        // =====================================================
        // CONFIGURACIÓN MODELO RADIO.FBX  ← ajusta aquí
        // =====================================================
        const RADIO_CONFIG = {
            url: 'Radio.fbx',
            position: { x: -2.146606233402686, y: 1.5, z: -19.8006284797463639 },  // coordenadas exactas de escena
            rotation: { x: 0, y: 90, z: 0 },  // ← ajustar eje
            scale: 0.05                                 // ← ajustar escala
        };
        let radioNode = null;   // nodo Three.js del modelo Radio
        let radioLoaded = false;  // evita cargas duplicadas

        // Step emojis by step id
        const stepEmojis = { 1: '📋', 2: '⚡', 3: '🔌', 4: '🔒', 5: '🏷️' };

        // =====================================================
        // DEFINICIÓN DE LOS PASOS DEL CHECKLIST
        // =====================================================
        // =====================================================
        // DEFINICIÓN DE LOS PASOS DEL CHECKLIST
        // ──────────────────────────────────────────────────────
        // INSTRUCCIÓN PARA CALIBRAR sweep_id:
        //   Abre la consola del navegador y navega manualmente
        //   por el modelo. El logger de sweeps (al final del script)
        //   imprimirá cada sweep_id al que llegues.
        //   Copia esos IDs y reemplaza los valores de abajo.
        // =====================================================
        const checklistSteps = [
            {
                id: 1,
                label: "Paso 1: Notificación y Autorización",
                objective: "Asegurar que el área sabe que el equipo se va a detener.",
                anchorPosition: { x: -19.8, y: 1.26, z: 1.722705161011619 },
                stemVector: { x: 0, y: 0, z: 0 },
                color: { r: 0.42, g: 0.27, b: 0.97 },
                iconId: 'public_characters_1',
                coordinates: {
                    sweep_id: 'SWEEP_ID_PASO_1',  // ← reemplazar con ID real de consola
                    rotation: { x: 0, y: 180 }    // pitch / yaw en grados
                },
                items: [
                    { text: "<strong>Identificar equipo:</strong> Confirmar visualmente el equipo a intervenir (ej. Molino SAC 3)." },
                    { text: "<strong>Tomar equipo de comunicación:</strong> Interactuar con la radio en la mesa de inicio." },
                    { text: "<strong>Contactar al encargado:</strong> Solicitar por radio la detención operativa del equipo." },
                    { text: "<strong>Recibir autorización:</strong> Escuchar la confirmación de detención por parte del jefe de turno antes de avanzar." }
                ]
            },
            {
                id: 2,
                label: "Paso 2: Identificación de Fuentes de Energía",
                objective: "Encontrar el punto exacto donde se debe cortar la energía.",
                anchorPosition: { x: -18.5, y: 1.26, z: -2.25 },
                stemVector: { x: 0, y: 0, z: 0 },
                color: { r: 0.97, g: 0.55, b: 0.10 },
                iconId: 'public_characters_2',
                coordinates: {
                    sweep_id: '80a800e3dbac4487b5fa87fd1908a2a3',
                    rotation: { x: 5, y: 90 }
                },
                items: [
                    { text: "<strong>Navegar a la sala eléctrica:</strong> Dirigirse al área de tableros." },
                    { text: "<strong>Localizar tablero general:</strong> Identificar el panel principal que alimenta el equipo." },
                    { text: "<strong>Ubicar el interruptor específico:</strong> Leer las etiquetas del tablero para encontrar la palanca exacta que corresponde al equipo a intervenir." }
                ]
            },
            {
                id: 3,
                label: "Paso 3: Aislamiento",
                objective: "Cortar físicamente el flujo de energía.",
                anchorPosition: { x: -18.034442683887985, y: 1.26, z: -2.25 },
                stemVector: { x: 0, y: 0, z: 0 },
                color: { r: 0.14, g: 0.78, b: 0.55 },
                iconId: 'public_characters_3',
                coordinates: {
                    sweep_id: 'SWEEP_ID_PASO_3',
                    rotation: { x: 5, y: 90 }
                },
                items: [
                    { text: "<strong>Posicionamiento:</strong> Situarse frente al interruptor identificado en el paso anterior." },
                    { text: "<strong>Accionar mecanismo:</strong> Bajar la palanca o girar el interruptor a la posición de apagado (\"OFF\")." },
                    { text: "<strong>Confirmación sensorial:</strong> Validar el corte mediante el feedback visual (luces apagadas) y auditivo (sonido del corte)." }
                ]
            },
            {
                id: 4,
                label: "Paso 4: Recolección de Etiquetas y Dispositivos",
                objective: "Obtener las herramientas personales de seguridad.",
                anchorPosition: { x: -12.8, y: 1.25, z: -2.625850974736056 },
                stemVector: { x: 0, y: 0, z: 0 },
                color: { r: 0.95, g: 0.20, b: 0.40 },
                iconId: 'public_characters_4',
                coordinates: {
                    sweep_id: 'SWEEP_ID_PASO_4',
                    rotation: { x: 0, y: 270 }
                },
                items: [
                    { text: "<strong>Ir a la estación de bloqueo:</strong> Desplazarse hacia la caja de seguridad amarilla (<em>SafeLockout</em>)." },
                    { text: "<strong>Tomar pinza múltiple (hasp):</strong> Retirar la pinza de la caja." },
                    { text: "<strong>Tomar candado personal:</strong> Retirar el candado asignado al trabajador." },
                    { text: "<strong>Tomar tarjeta de peligro:</strong> Retirar la etiqueta y confirmar que los datos (nombre, fecha, motivo) estén visibles." }
                ]
            },
            {
                id: 5,
                label: "Paso 5: Bloqueo y Etiquetado",
                objective: "Bloquear físicamente el interruptor para que nadie pueda encenderlo por error.",
                anchorPosition: { x: -17.48982384704301, y: 1.26, z: -2.25 },
                stemVector: { x: 0, y: 0, z: 0 },
                color: { r: 0.95, g: 0.75, b: 0.05 },
                iconId: 'public_characters_5',
                coordinates: {
                    sweep_id: 'SWEEP_ID_PASO_5',
                    rotation: { x: 5, y: 90 }
                },
                items: [
                    { text: "<strong>Regresar al punto de corte:</strong> Volver al tablero aislado en el Paso 3." },
                    { text: "<strong>Instalar pinza:</strong> Colocar la pinza en los orificios de bloqueo de la palanca." },
                    { text: "<strong>Instalar candado:</strong> Insertar el candado cerrando la pinza." },
                    { text: "<strong>Instalar tarjeta:</strong> Enganchar la tarjeta de advertencia de \"PELIGRO\" junto al candado." }
                ]
            }
        ];

        // Estado de los checkboxes: stepId -> array de booleans
        const checkState = {};
        checklistSteps.forEach(step => {
            checkState[step.id] = step.items.map(() => false);
        });

        // ── ÍNDICE SECUENCIAL ──────────────────────────────────
        let currentStepIndex = 0;   // índice en checklistSteps[]
        let isAdvancing = false;    // bloqueo durante la transición

        // =====================================================
        // FUNCIONES DEL PANEL
        // =====================================================

        // =====================================================
        // FUNCIÓN CENTRAL DE MOVIMIENTO — desacoplada (fire-and-forget)
        // El UI avanza SIEMPRE en 800ms. La cámara se mueve en segundo plano.
        // =====================================================

        // Mapa inverso: stepId → sid del Mattertag generado
        // Se puebla dentro del loop de sdk.Mattertag.add (más abajo)
        const stepSidMap = {};

        function navigateToStep(index) {
            if (index < 0 || index >= checklistSteps.length) {
                isAdvancing = false;
                return;
            }

            const step = checklistSteps[index];

            // 1. Forzar UI a avanzar (anti-bloqueos)
            setTimeout(() => {
                renderChecklistUI(index);
                isAdvancing = false; 
            }, 800);

            // 2. Doble Intento de Navegación
            try {
                if (!mpSdk) return;
                
                const sweepId = step.coordinates.sweep_id ? step.coordinates.sweep_id.trim() : null;
                const tagSid = stepSidMap[step.id];

                console.log(`🚀 [Paso ${step.id}] Intentando salto a Sweep: ${sweepId}`);

                // INTENTO A: Teletransporte al Sweep del piso
                mpSdk.Sweep.moveTo(sweepId, {
                    transition: mpSdk.Sweep.Transition.INSTANT
                }).then(() => {
                    console.log('✅ [ÉXITO] Cámara teletransportada al Sweep.');
                }).catch(sweepError => {
                    console.warn(`⚠️ Falló el salto al Sweep. Intentando Plan B (Mattertag). Error:`, sweepError);
                    
                    // INTENTO B: Si falla el piso, volamos hacia el Tag
                    if (tagSid) {
                        mpSdk.Mattertag.navigateTo(tagSid, {
                            transition: mpSdk.Sweep.Transition.FLY
                        }).then(() => {
                            console.log('✅ [ÉXITO] Cámara navegó hacia el Mattertag.');
                        }).catch(tagError => {
                            console.error(`❌ [ERROR CRÍTICO] El bundle local bloqueó ambos métodos de movimiento:`, tagError);
                        });
                    }
                });
            } catch (error) {
                console.error(`❌ Error general en SDK:`, error);
            }
        }

        // =====================================================
        // RENDERIZADO DE UI (solo panel, sin tocar la cámara)
        // =====================================================
        function renderChecklistUI(index) {
            if (index < 0 || index >= checklistSteps.length) return;
            currentStepIndex = index;
            const step = checklistSteps[index];

            document.getElementById('panel-header-label').textContent = `Paso ${step.id} de ${checklistSteps.length}`;
            document.getElementById('panel-step-emoji').textContent = stepEmojis[step.id] || '📋';
            document.getElementById('panel-title-text').textContent = step.label;
            document.getElementById('panel-objective').textContent = step.objective;

            renderItems(step);
            updateProgress(step);
            document.getElementById('checklist-panel').classList.add('visible');

            // ── VISIBILIDAD RADIO.FBX ──────────────────────────────
            // Solo visible en Paso 1 (index === 0)
            if (index === 0) {
                loadRadioModel();   // carga (si no existe) y muestra
            } else {
                hideRadioModel();   // oculta sin destruir el nodo
            }

            isAdvancing = false;  // liberar bloqueo una vez que el UI está listo
        }

        // Alias principal (usado desde tag click y auto-avance)
        function renderCurrentStep(index) {
            navigateToStep(index);
        }

        /**
         * Abrir por stepId cuando el usuario hace click en un Mattertag.
         * El usuario YA está en la posición del tag → solo actualizar UI, NO navegar.
         */
        function openChecklist(stepId) {
            const index = checklistSteps.findIndex(s => s.id === stepId);
            if (index !== -1) renderChecklistUI(index);
        }

        function renderItems(step) {
            const container = document.getElementById('checklist-items-container');
            container.innerHTML = '';

            // 1. Dibujar los checkboxes
            step.items.forEach((item, idx) => {
                const checked = checkState[step.id][idx];
                const div = document.createElement('div');
                div.className = 'checklist-item' + (checked ? ' checked' : '');
                div.innerHTML = `
                    <div class="check-box">
                        <span class="check-icon">✓</span>
                    </div>
                    <div class="item-text">${item.text}</div>
                `;
                div.onclick = () => toggleItem(step.id, idx);
                container.appendChild(div);
            });

            // 2. Lógica del Botón Dinámico
            const allChecked = checkState[step.id].every(Boolean);
            if (allChecked) {
                const btn = document.createElement('button');
                btn.className = 'next-step-btn';
                const nextIndex = currentStepIndex + 1;

                if (nextIndex < checklistSteps.length) {
                    btn.textContent = `Ir al Paso ${checklistSteps[nextIndex].id} →`;
                    btn.onclick = () => {
                        if (isAdvancing) return;
                        isAdvancing = true;
                        btn.textContent = 'Navegando...';
                        btn.style.opacity = '0.7';
                        navigateToStep(nextIndex); // mueve cámara y luego actualiza UI
                    };
                } else {
                    btn.textContent = 'Finalizar Capacitación ✅';
                    btn.onclick = () => {
                        showAllDone();
                    };
                }
                container.appendChild(btn);
            }
        }

        function toggleItem(stepId, idx) {
            if (isAdvancing) return;
            checkState[stepId][idx] = !checkState[stepId][idx];
            const step = checklistSteps.find(s => s.id === stepId);
            renderItems(step); // renderItems ahora dibuja el botón si está completo
            updateProgress(step);
        }

        function updateProgress(step) {
            const total = step.items.length;
            const done = checkState[step.id].filter(Boolean).length;
            const pct = total > 0 ? Math.round((done / total) * 100) : 0;
            document.getElementById('progress-label').textContent = `${done} / ${total} completados`;
            document.getElementById('progress-bar').style.width = pct + '%';
        }



        function closeChecklist() {
            document.getElementById('checklist-panel').classList.remove('visible');
        }

        /** Pantalla de cierre cuando se completan todos los pasos */
        function showAllDone() {
            const container = document.getElementById('checklist-items-container');
            container.innerHTML = `
                <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;padding:40px 20px;text-align:center">
                    <div style="font-size:48px">🎉</div>
                    <div style="font-size:15px;font-weight:700;color:#ffffff">¡Checklist completo!</div>
                    <div style="font-size:12px;color:#8e8e93;line-height:1.5">Todos los pasos del procedimiento de bloqueo han sido completados exitosamente.</div>
                </div>
            `;
            document.getElementById('progress-label').textContent = `${checklistSteps.length} / ${checklistSteps.length} pasos completados`;
            document.getElementById('progress-bar').style.width = '100%';
            document.getElementById('panel-header-label').textContent = 'Finalizado ✓';
            document.getElementById('panel-step-emoji').textContent = '✅';
            document.getElementById('panel-title-text').textContent = 'Procedimiento completado';
            document.getElementById('panel-objective').textContent = 'Todos los pasos han sido ejecutados correctamente.';
        }


        function toggleFbxModel() {
            if (!fbxNode) return;
            fbxVisible = !fbxVisible;

            // Cambiar visibilidad en todos los componentes del nodo
            fbxNode.obj3D.visible = fbxVisible;

            // Actualizar botón
            const btn = document.getElementById('toggle-fbx-btn');
            const label = document.getElementById('toggle-fbx-label');
            if (fbxVisible) {
                btn.classList.remove('off');
                label.textContent = 'Modelo BIM';
            } else {
                btn.classList.add('off');
                label.textContent = 'Modelo BIM';
            }
        }

        // =====================================================
        // RADIO MODEL — carga y control de visibilidad
        // =====================================================
        async function loadRadioModel() {
            if (!mpSdk) { console.warn('⚠️ [Radio] SDK no disponible aún.'); return; }
            if (radioLoaded && radioNode) {
                // Ya cargado: solo hacer visible
                radioNode.obj3D.visible = true;
                console.log('📻 [Radio] Nodo reutilizado — visible = true');
                return;
            }

            try {
                const s = RADIO_CONFIG.scale;
                radioNode = await mpSdk.Scene.createNode();
                radioNode.addComponent('mp.fbxLoader', {
                    url: RADIO_CONFIG.url,
                    visible: true,
                    localScale: { x: s, y: s, z: s },
                    localPosition: RADIO_CONFIG.position,
                    localRotation: RADIO_CONFIG.rotation
                });
                radioNode.start();
                radioLoaded = true;
                console.log('📻 [Radio] Modelo cargado en posición:', RADIO_CONFIG.position);
            } catch (e) {
                console.error('❌ [Radio] Error al cargar Radio.fbx:', e);
            }
        }

        function hideRadioModel() {
            if (radioNode && radioNode.obj3D) {
                radioNode.obj3D.visible = false;
                console.log('📻 [Radio] Oculto (paso > 0)');
            }
        }

        // =====================================================
        // INICIALIZACIÓN DEL SDK
        // =====================================================
        showcase.addEventListener('load', async function () {
            try {
                sdk = await showcase.contentWindow.MP_SDK.connect(showcase, 'myhcpcdgdh7907ggei7s5f4md');
                mpSdk = sdk;   // exponer alias semántico para uso en renderCurrentStep()
            } catch (e) {
                console.error(e);
                return;
            }

            console.log('Hello Bundle SDK', sdk);

            // Luces
            const lights = await sdk.Scene.createNode();
            lights.addComponent('mp.lights');
            lights.start();

            // Modelo FBX
            var escala2 = 0.1;
            fbxNode = await sdk.Scene.createNode();
            var fbxComponent = fbxNode.addComponent('mp.fbxLoader', {
                url: "Instalaciones-2.FBX",
                visible: true,
                localScale: { x: escala2, y: escala2, z: escala2 },
                localPosition: { x: -18, y: -2.2, z: -2.5 },
                localRotation: { x: 90, y: 0, z: 0 }
            });
            fbxNode.start();

            // Habilitar el botón una vez el modelo está listo
            document.getElementById('toggle-fbx-btn').style.display = 'flex';

            // =====================================================
            // HELPERS: crear ícono numerado con canvas
            // =====================================================
            function makeNumberIcon(number, color) {
                const canvas = document.createElement('canvas');
                canvas.width = 128;
                canvas.height = 128;
                const ctx = canvas.getContext('2d');
                const cx = 64, cy = 64, r = 56;

                // Círculo de fondo con el color del paso
                const cr = Math.round(color.r * 255);
                const cg = Math.round(color.g * 255);
                const cb = Math.round(color.b * 255);
                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, Math.PI * 2);
                ctx.fillStyle = `rgb(${cr}, ${cg}, ${cb})`;
                ctx.fill();

                // Borde blanco
                ctx.strokeStyle = 'rgba(255,255,255,0.9)';
                ctx.lineWidth = 6;
                ctx.stroke();

                // Número en blanco, centrado
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 64px Arial, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(number.toString(), cx, cy + 2);

                return canvas.toDataURL('image/png');
            }

            // =====================================================
            // AGREGAR TAGS DEL CHECKLIST CON sdk.Mattertag.add
            // =====================================================
            const tagSidMap = {}; // sid -> stepId  (para clicks en tags)

            for (const step of checklistSteps) {
                try {
                    // 1. Registrar el ícono numerado (canvas → dataURL → SDK)
                    const iconId = `paso_num_${step.id}`;
                    const iconDataUrl = makeNumberIcon(step.id, step.color);
                    await sdk.Mattertag.registerIcon(iconId, iconDataUrl);

                    // 2. Crear el Mattertag con anchorPosition del paso
                    const [sid] = await sdk.Mattertag.add({
                        label: step.label,
                        description: '',
                        anchorPosition: step.anchorPosition,
                        stemVector: step.stemVector,
                        color: step.color
                    });

                    // 3. Poblar ambos mapas
                    tagSidMap[sid] = step.id;  // sid → stepId  (para click handler)
                    stepSidMap[step.id] = sid;    // stepId → sid  (para navigateToStep)

                    // 4. Aplicar el ícono numerado al disco del tag
                    await sdk.Mattertag.editIcon(sid, iconId);

                    console.log(`✅ Mattertag creado: "${step.label}" | sid: ${sid} | pos:`, step.anchorPosition);
                } catch (e) {
                    console.error(`❌ Error creando tag paso ${step.id}:`, e);
                }
            }

            // ── ESTRATEGIA 1: evento CLICK directo del SDK ──────────
            sdk.on(sdk.Mattertag.Event.CLICK, function (sid) {
                console.log('🔖 [Estrategia-1] Tag clickeado, sid:', sid);
                const stepId = tagSidMap[sid];
                if (stepId !== undefined) {
                    openChecklist(stepId);
                }
            });

            // ── ESTRATEGIA 2: observable Mattertag.data (fallback) ──
            // Detecta cuando el usuario navega hacia un tag (hover/open)
            sdk.Mattertag.data.subscribe({
                onAdded: function (index, item) { /* tags registrados */ },
                onRemoved: function (index, item) { /* tags eliminados */ },
                onUpdated: function (index, item) {
                    // item.enabled === false cuando el tag está siendo "abierto"
                    // Algunos builds del Bundle SDK no disparan CLICK; usan este canal
                    if (item && item.sid && tagSidMap[item.sid] !== undefined) {
                        console.log('🔖 [Estrategia-2] Tag updated (posible click):', item.sid, item);
                    }
                },
                onCollectionUpdated: function (collection) { /* colección completa */ }
            });

            // ── preventAction por sid individual (evita popup nativo) ─
            for (const tagSid of Object.keys(tagSidMap)) {
                sdk.Mattertag.preventAction(tagSid, { opening: false })
                    .then(() => console.log(`✅ preventAction OK: ${tagSid}`))
                    .catch(e => console.warn(`preventAction no soportado (${tagSid}):`, e.message || e));
            }

            // ── Logger de posición (debug) ─────────────────────────
            sdk.Sweep.current.subscribe(function (currentSweep) {
                if (currentSweep && currentSweep.sid) {
                    console.log(`📍 SWEEP ACTUAL --> sid: "${currentSweep.sid}"`);
                }
            });

            // Coordenadas al hacer click en el espacio
            sdk.Pointer.intersection.subscribe((intersection) => {
                console.log("📍 COORDENADAS EXACTAS ---> ", intersection.position);
            });
        });
    </script>
